<svg width="860" height="240" viewBox="0 0 860 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Helix — take your AI's memory anywhere">
  <defs>
    <linearGradient id="bStrandA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#7b5bff"/>
    </linearGradient>
    <linearGradient id="bStrandB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ec9a3"/>
      <stop offset="1" stop-color="#3ba6ff"/>
    </linearGradient>
    <linearGradient id="bBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121829"/>
      <stop offset="1" stop-color="#0b0e14"/>
    </linearGradient>
    <linearGradient id="bWord" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eaf0ff"/>
      <stop offset="1" stop-color="#9fc0ff"/>
    </linearGradient>
    <filter id="bGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="858" height="238" rx="28" fill="#0b0e14"/>
  <rect x="1" y="1" width="858" height="238" rx="28" fill="url(#bBg)" stroke="#222a3c" stroke-width="2"/>

  <!-- double-helix mark -->
  <g transform="translate(54,12)" filter="url(#bGlow)" stroke-linecap="round">
    <g stroke="#5e6b85" stroke-width="5" opacity="0.85">
      <line x1="40" y1="48" x2="80" y2="48"/>
      <line x1="33" y1="72" x2="87" y2="72"/>
      <line x1="40" y1="96" x2="80" y2="96"/>
      <line x1="40" y1="144" x2="80" y2="144"/>
      <line x1="33" y1="168" x2="87" y2="168"/>
      <line x1="40" y1="192" x2="80" y2="192"/>
    </g>
    <path d="M60 24 C96 56 96 88 60 120 C24 152 24 184 60 216" stroke="url(#bStrandA)" stroke-width="8" fill="none"/>
    <path d="M60 24 C24 56 24 88 60 120 C96 152 96 184 60 216" stroke="url(#bStrandB)" stroke-width="8" fill="none"/>
    <circle cx="87" cy="72" r="5.5" fill="#7b5bff"/><circle cx="33" cy="72" r="5.5" fill="#3ba6ff"/>
    <circle cx="33" cy="168" r="5.5" fill="#7b5bff"/><circle cx="87" cy="168" r="5.5" fill="#3ba6ff"/>
  </g>

  <!-- wordmark -->
  <text x="232" y="118" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif" font-size="76" font-weight="800" fill="url(#bWord)" letter-spacing="-1">Helix</text>
  <text x="236" y="158" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif" font-size="24" font-weight="500" fill="#aeb7c9">Take your AI&#8217;s memory anywhere.</text>
  <text x="236" y="190" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#5b8cff" letter-spacing="0.5">local-first &#183; portable &#183; git-like &#183; $0 by default</text>
</svg>
