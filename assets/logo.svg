<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Helix logo">
  <defs>
    <linearGradient id="strandA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#7b5bff"/>
    </linearGradient>
    <linearGradient id="strandB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ec9a3"/>
      <stop offset="1" stop-color="#3ba6ff"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161c2b"/>
      <stop offset="1" stop-color="#0b0e14"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="2" y="2" width="196" height="196" rx="44" fill="url(#bg)" stroke="#232a3a" stroke-width="2"/>

  <g transform="translate(40,-20)" filter="url(#glow)" stroke-linecap="round">
    <!-- base pairs (memory rungs) -->
    <g stroke="#5e6b85" stroke-width="5" opacity="0.85">
      <line x1="40" y1="48" x2="80" y2="48"/>
      <line x1="33" y1="72" x2="87" y2="72"/>
      <line x1="40" y1="96" x2="80" y2="96"/>
      <line x1="40" y1="144" x2="80" y2="144"/>
      <line x1="33" y1="168" x2="87" y2="168"/>
      <line x1="40" y1="192" x2="80" y2="192"/>
    </g>
    <!-- strands -->
    <path d="M60 24 C96 56 96 88 60 120 C24 152 24 184 60 216" stroke="url(#strandA)" stroke-width="8" fill="none"/>
    <path d="M60 24 C24 56 24 88 60 120 C96 152 96 184 60 216" stroke="url(#strandB)" stroke-width="8" fill="none"/>
    <!-- nodes -->
    <g>
      <circle cx="80" cy="48" r="5" fill="#5b8cff"/><circle cx="40" cy="48" r="5" fill="#4ec9a3"/>
      <circle cx="87" cy="72" r="5.5" fill="#7b5bff"/><circle cx="33" cy="72" r="5.5" fill="#3ba6ff"/>
      <circle cx="33" cy="168" r="5.5" fill="#7b5bff"/><circle cx="87" cy="168" r="5.5" fill="#3ba6ff"/>
      <circle cx="40" cy="192" r="5" fill="#5b8cff"/><circle cx="80" cy="192" r="5" fill="#4ec9a3"/>
    </g>
  </g>
</svg>
