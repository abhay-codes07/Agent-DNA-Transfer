<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Helix — take your AI's memory anywhere">
  <defs>
    <linearGradient id="scBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121829"/>
      <stop offset="1" stop-color="#0a0d13"/>
    </linearGradient>
    <radialGradient id="scGlow" cx="0.22" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5b8cff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="scStrandA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b8cff"/><stop offset="1" stop-color="#7b5bff"/>
    </linearGradient>
    <linearGradient id="scStrandB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ec9a3"/><stop offset="1" stop-color="#3ba6ff"/>
    </linearGradient>
    <linearGradient id="scWord" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eaf0ff"/><stop offset="1" stop-color="#9fc0ff"/>
    </linearGradient>
    <filter id="scGlowF" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#scBg)"/>
  <rect width="1280" height="640" fill="url(#scGlow)"/>

  <!-- double-helix mark (scaled) -->
  <g transform="translate(150,80) scale(2.0)" filter="url(#scGlowF)" stroke-linecap="round">
    <g stroke="#5e6b85" stroke-width="5" opacity="0.85">
      <line x1="40" y1="48" x2="80" y2="48"/><line x1="33" y1="72" x2="87" y2="72"/>
      <line x1="40" y1="96" x2="80" y2="96"/><line x1="40" y1="144" x2="80" y2="144"/>
      <line x1="33" y1="168" x2="87" y2="168"/><line x1="40" y1="192" x2="80" y2="192"/>
    </g>
    <path d="M60 24 C96 56 96 88 60 120 C24 152 24 184 60 216" stroke="url(#scStrandA)" stroke-width="8" fill="none"/>
    <path d="M60 24 C24 56 24 88 60 120 C96 152 96 184 60 216" stroke="url(#scStrandB)" stroke-width="8" fill="none"/>
    <circle cx="87" cy="72" r="5.5" fill="#7b5bff"/><circle cx="33" cy="72" r="5.5" fill="#3ba6ff"/>
    <circle cx="33" cy="168" r="5.5" fill="#7b5bff"/><circle cx="87" cy="168" r="5.5" fill="#3ba6ff"/>
  </g>

  <text x="470" y="300" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif" font-size="132" font-weight="800" fill="url(#scWord)" letter-spacing="-2">Helix</text>
  <text x="476" y="360" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif" font-size="40" font-weight="500" fill="#aeb7c9">Take your AI&#8217;s memory anywhere.</text>

  <!-- feature pills -->
  <g font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="600">
    <g transform="translate(476,420)">
      <rect width="190" height="48" rx="24" fill="#171d2b" stroke="#2a3346"/><text x="95" y="31" text-anchor="middle" fill="#7ea2ff">local-first</text>
    </g>
    <g transform="translate(682,420)">
      <rect width="210" height="48" rx="24" fill="#171d2b" stroke="#2a3346"/><text x="105" y="31" text-anchor="middle" fill="#5ad1b0">portable .dna</text>
    </g>
    <g transform="translate(908,420)">
      <rect width="196" height="48" rx="24" fill="#171d2b" stroke="#2a3346"/><text x="98" y="31" text-anchor="middle" fill="#7ea2ff">MCP-native</text>
    </g>
    <g transform="translate(476,484)">
      <rect width="300" height="48" rx="24" fill="#171d2b" stroke="#2a3346"/><text x="150" y="31" text-anchor="middle" fill="#5ad1b0">$0 &#183; offline by default</text>
    </g>
  </g>

  <text x="476" y="576" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="500" fill="#5b6680">github.com/abhay-codes07/Agent-DNA-Transfer</text>
</svg>
