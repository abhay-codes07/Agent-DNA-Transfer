name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # PyPI Trusted Publishing (no API token needed)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Build all packages (sdist + wheel)
        run: |
          uv build . --out-dir dist   # the helix-dna meta-package (metadata only)
          for pkg in helix-core helix-cli helix-mcp helix-sdk-python; do
            uv build "packages/$pkg" --out-dir dist
          done
          ls -l dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
