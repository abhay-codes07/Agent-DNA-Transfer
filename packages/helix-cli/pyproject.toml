[project]
name = "helix-cli"
version = "0.0.1"
description = "The `helix` command — init, connect, export/import/merge, log, search, doctor."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = ["helix-core", "helix-mcp", "typer>=0.12", "rich"]

[project.scripts]
helix = "helix_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helix_cli"]
