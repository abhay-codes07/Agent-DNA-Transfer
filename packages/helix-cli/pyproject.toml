[project]
name = "helix-dna-cli"
version = "0.1.1"
description = "The `helix` command — init, connect, export/import/merge, log, search, doctor."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
keywords = ["ai", "memory", "mcp", "agents", "local-first", "portable", "cli"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]
# The CLI is the main install target, so it pulls the full core (crypto + embeddings).
dependencies = ["helix-dna-core[all]", "helix-dna-mcp", "typer>=0.12", "rich"]

[project.scripts]
helix = "helix_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helix_cli"]

[project.urls]
Homepage = "https://github.com/abhay-codes07/Agent-DNA-Transfer"
Repository = "https://github.com/abhay-codes07/Agent-DNA-Transfer"
