[project]
name = "helix-mcp"
version = "0.0.1"
description = "Helix MCP server — exposes the memory tool/resource surface to any MCP agent."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = ["helix-core", "mcp>=1.0"]

[project.scripts]
helix-mcp = "helix_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helix_mcp"]
