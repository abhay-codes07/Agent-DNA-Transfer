[project]
name = "helix-dna-core"
version = "0.1.1"
description = "Helix engine: extraction, stores, retrieval, consolidation, and the .dna codec."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
keywords = ["ai", "memory", "mcp", "agents", "local-first", "portable"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
]

# The $0/offline core has NO required runtime dependencies — it is pure stdlib (sqlite3,
# hashlib, urllib, …). Opt-in features live behind extras and are imported lazily:
dependencies = []

[project.optional-dependencies]
# Semantic embeddings (bge-small via fastembed ONNX); without it, a dependency-free hashing
# embedder is used. The LLM router (Gemini/OpenAI/Ollama) uses stdlib urllib — no extra needed.
embeddings = ["fastembed>=0.3"]
# The portable .dna strand: XChaCha20-Poly1305 + Ed25519 + Argon2id (libsodium) + BLAKE3
# (BLAKE3 is optional — a stdlib BLAKE2b Merkle is used when it's absent).
crypto = ["pynacl>=1.5", "blake3>=0.4"]
# Experimental Postgres+pgvector backend for large/shared strands (PgVectorStore).
postgres = ["psycopg[binary]>=3.1", "pgvector>=0.2"]
all = ["fastembed>=0.3", "pynacl>=1.5", "blake3>=0.4"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helix_core"]

[project.urls]
Homepage = "https://github.com/abhay-codes07/Agent-DNA-Transfer"
Repository = "https://github.com/abhay-codes07/Agent-DNA-Transfer"
