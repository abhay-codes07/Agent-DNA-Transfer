[project]
name = "helix-core"
version = "0.1.0"
description = "Helix engine: extraction, stores, retrieval, consolidation, and the .dna codec."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }

# The $0/offline core has NO required runtime dependencies — it is pure stdlib (sqlite3,
# hashlib, urllib, …). Opt-in features live behind extras and are imported lazily:
dependencies = []

[project.optional-dependencies]
# Semantic embeddings (bge-small via fastembed ONNX); without it, a dependency-free hashing
# embedder is used. The LLM router (Gemini/OpenAI/Ollama) uses stdlib urllib — no extra needed.
embeddings = ["fastembed>=0.3"]
# The portable .dna strand: XChaCha20-Poly1305 + Ed25519 + Argon2id (libsodium).
crypto = ["pynacl>=1.5"]
all = ["fastembed>=0.3", "pynacl>=1.5"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helix_core"]
