[project]
name = "helix-dna-sdk"
version = "0.1.0"
description = "Programmatic Python SDK for embedding Helix memory in custom agents."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = ["helix-dna-core[all]"]  # SDK exposes transfer (.dna) -> needs crypto + embeddings

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/helix_sdk"]
